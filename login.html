<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — VendorList</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">VendorList</span>
      </a>
      <h1>Bienvenido de vuelta</h1>
      <p class="subtitle">Accede a tu perfil de negocio</p>

      <div id="errorBox" class="hidden" style="background:rgba(255,77,109,0.1);color:var(--primary);padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;"></div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@negocio.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password"/>
      </div>
      <button class="btn-full" onclick="handleLogin()" id="loginBtn">
        <span>Entrar</span>
      </button>

      <div class="auth-switch">
        ¿No tienes cuenta? <a href="register.html">Registra tu negocio</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    window.handleLogin = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('errorBox');
      const btn = document.getElementById('loginBtn');

      errorBox.classList.add('hidden');

      if (!email || !password) {
        errorBox.textContent = 'Por favor completa todos los campos.';
        errorBox.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span>Entrando...</span>';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = '../index.html';
      } catch (err) {
        let msg = 'Error al iniciar sesión.';
        if (err.code === 'auth/user-not-found') msg = 'No existe cuenta con ese correo.';
        if (err.code === 'auth/wrong-password') msg = 'Contraseña incorrecta.';
        if (err.code === 'auth/invalid-email') msg = 'Correo inválido.';
        if (err.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Intenta más tarde.';
        errorBox.textContent = msg;
        errorBox.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Entrar</span>';
      }
    };

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
